name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            spark/package-lock.json
            links-with-friends/package-lock.json

      - run: npm install
        working-directory: spark
      - run: npm run build
        working-directory: spark

      - run: npm install
        working-directory: links-with-friends
      - run: npm run build
        working-directory: links-with-friends

      # Merge both builds: spark/dist is the root, lwf goes inside it
      - run: cp -r links-with-friends/dist spark/dist/links-with-friends

      - uses: actions/upload-pages-artifact@v3
        with:
          path: spark/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
